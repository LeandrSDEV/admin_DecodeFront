server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # env.js is regenerated at container start — never cache it
    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # Hashed assets can be cached aggressively
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
